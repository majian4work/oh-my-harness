[[cases]]
name = "orchestrator_short_hello"
agent = "orchestrator"
prompt = "Reply with one short sentence containing the word hello. Do not use tools."
contains_all = ["hello"]
not_contains = ["error", "```"]
max_tool_calls = 0
max_tool_errors = 0
disallow_error_categories = ["timeout", "provider", "tool_not_found"]

[[cases]]
name = "oracle_basic_math"
agent = "oracle"
prompt = "Answer this in one short sentence: what is 1 + 1? Do not use tools."
contains_any = ["2", "two"]
not_contains = ["error"]
max_tool_calls = 0
max_tool_errors = 0
disallow_error_categories = ["timeout", "provider"]

[[cases]]
name = "worker_ready_without_tools"
agent = "worker"
prompt = "Reply with READY and one short Chinese phrase. Do not use any tools."
contains_any = ["READY", "ready"]
not_contains = ["error"]
max_tool_calls = 0
max_tool_errors = 0
disallow_error_categories = ["timeout", "provider"]

[[cases]]
name = "repo_model_alias_lookup"
agent = "orchestrator"
prompt = "Search the repository for model alias definitions. Find the normalized model id for alias gpt-5 by inspecting the codebase. Reply with the model id only."
contains_all = ["gpt-5.4"]
not_contains = ["error"]
min_tool_calls = 1
max_tool_errors = 0
disallow_error_categories = ["timeout", "provider", "tool_not_found"]

[[cases]]
name = "repo_runtime_reexports"
agent = "orchestrator"
prompt = "Inspect the repository and name two items re-exported from libs/runtime/src/lib.rs. Reply with a short comma-separated list."
contains_any = ["AgentRuntime", "BackgroundTaskManager", "Harness", "SessionLogger", "SpawnAgentTool", "TurnResult", "TurnRouting"]
not_contains = ["error"]
min_tool_calls = 1
max_tool_errors = 0
disallow_error_categories = ["timeout", "provider", "tool_not_found"]
